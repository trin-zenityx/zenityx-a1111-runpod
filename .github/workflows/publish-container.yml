name: Publish container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/trin-zenityx/zenityx-a1111-runpod

jobs:
  validate-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Validate project
        run: |
          python3 scripts/validate_project.py
          python3 -m py_compile scripts/*.py
          bash -n docker/entrypoint.sh

      # Standard public runners are free but have limited free disk. The CUDA,
      # PyTorch and A1111 layers need space that preinstalled SDKs otherwise use.
      - name: Free build disk
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/.ghcup /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=ZenityX A1111 for RunPod
            org.opencontainers.image.description=Versioned AUTOMATIC1111 container for isolated RunPod Pods
            org.opencontainers.image.source=https://github.com/trin-zenityx/zenityx-a1111-runpod
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and publish linux/amd64 image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
