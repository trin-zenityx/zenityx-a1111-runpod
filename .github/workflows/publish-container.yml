name: Publish container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  IMAGE_NAME: ghcr.io/trin-zenityx/zenityx-a1111-runpod

jobs:
  validate-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Validate project
        run: |
          python3 scripts/validate_project.py
          python3 -m py_compile scripts/*.py
          bash -n docker/entrypoint.sh

      # Standard public runners are free but have limited free disk. The CUDA,
      # PyTorch and A1111 layers need space that preinstalled SDKs otherwise use.
      - name: Free build disk
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo rm -rf /usr/local/.ghcup /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker system prune --all --force
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=ZenityX A1111 for RunPod
            org.opencontainers.image.description=Versioned AUTOMATIC1111 container for isolated RunPod Pods
            org.opencontainers.image.source=https://github.com/trin-zenityx/zenityx-a1111-runpod
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and publish linux/amd64 image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
